name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Bump version in root package.json (no git tag — we create it ourselves)
      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # Sync version to sub-packages
      - name: Sync sub-package versions
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ steps.bump.outputs.version }}';
            const subPkg = 'vscode-dvala/package.json';
            const pkg = JSON.parse(fs.readFileSync(subPkg, 'utf-8'));
            pkg.version = version;
            fs.writeFileSync(subPkg, JSON.stringify(pkg, null, 2) + '\n');
          "

      # Run full check (lint, typecheck, test, build) — also updates lockfile
      - name: Check
        run: npm run check

      # Create release branch, push, and open PR with auto-merge
      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "release: v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "release: v${VERSION}" \
            --body "Automated version bump to v${VERSION} (${{ inputs.bump }})." \
            --base main \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --squash --auto

  # After the release PR is merged, tag main with the version
  tag:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Wait for merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          BRANCH="release/v${VERSION}"
          # Poll until the PR is merged (auto-merge needs CI to pass first)
          for i in $(seq 1 60); do
            STATE=$(gh pr view "$BRANCH" --json state --jq .state 2>/dev/null || echo "UNKNOWN")
            if [ "$STATE" = "MERGED" ]; then
              echo "PR merged!"
              exit 0
            fi
            echo "Waiting for merge... (attempt $i, state=$STATE)"
            sleep 10
          done
          echo "Timed out waiting for PR merge"
          exit 1

      - name: Tag and push
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          git fetch origin main
          git checkout main
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

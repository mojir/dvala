name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Bump version in root package.json (no git tag — we create it ourselves)
      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # Sync version to sub-packages
      - name: Sync sub-package versions
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ steps.bump.outputs.version }}';
            const subPkg = 'vscode-dvala/package.json';
            const pkg = JSON.parse(fs.readFileSync(subPkg, 'utf-8'));
            pkg.version = version;
            fs.writeFileSync(subPkg, JSON.stringify(pkg, null, 2) + '\n');
          "

      # Run full check (lint, typecheck, test, build) — also updates lockfile
      - name: Check
        run: npm run check

      # Commit and push directly to main (requires bypass actor in ruleset)
      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --tags

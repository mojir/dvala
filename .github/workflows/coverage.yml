name: Coverage (manual)

# Runs full code coverage and uploads the report as an artifact. Triggered
# manually (Actions tab → Run workflow, or `gh workflow run coverage.yml`) —
# PR-time CI runs without coverage for speed, and coverage is tracked by hand
# for now rather than on a schedule.
on:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test:coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      # Separate `.dvala` builtin coverage report (union baseline), produced by the
      # DVALA_COVERAGE=1 run folded into test:coverage. Report-only, not a gate.
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report-dvala
          path: coverage-dvala/
          retention-days: 30

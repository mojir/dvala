name: CI

on:
  pull_request:
    branches: [main]
    # Skip CI on PRs that only touch docs/design/markdown — they can't break
    # tests by definition. The companion `ci-docs-stub.yml` workflow runs on
    # the inverse path set with the same job names so branch protection's
    # required checks (`static`, `test (0)`, `test (1)`, `e2e`) still report
    # a status on docs-only PRs.
    paths-ignore:
      - 'design/**'
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + typecheck + knip — all fold-independent, so run them once.
  static:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint:no-fix

      - run: pnpm run typecheck

      - run: pnpm run knip

  # Tests under both DVALA_FOLD=0 (env default, fold disabled) and
  # DVALA_FOLD=1 (fold enabled). Both must pass identically — any test that
  # behaves differently under the two settings is either a bug in folding or
  # a test that implicitly depends on non-folded behaviour (decision #13 +
  # Phase B design doc).
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fold: ['0', '1']
      fail-fast: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DVALA_FOLD: ${{ matrix.fold }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test

  e2e:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Cache Playwright browsers keyed on the @playwright/test version. On
      # cache hit we only need to install the system deps (~5s); on miss the
      # full --with-deps install runs (~30-60s).
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright (browsers + deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: pnpm run build

      - run: pnpm run test:e2e

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Run the full check pipeline under both DVALA_FOLD=0 (env default, fold
    # disabled) and DVALA_FOLD=1 (fold enabled). Both must pass identically —
    # any test that behaves differently under the two settings is either a
    # bug in folding or a test that implicitly depends on non-folded
    # behaviour (decision #13 + Phase B design doc).
    strategy:
      matrix:
        fold: ['0', '1']
      fail-fast: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DVALA_FOLD: ${{ matrix.fold }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check:no-fix

  e2e:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build

      - run: npm run test:e2e
